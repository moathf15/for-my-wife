<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>معايدة لزوجتي ❤️</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family: Arial, sans-serif;
  background: linear-gradient(#fff0f5,#ffe4e1);
  text-align:center;
  direction:rtl;
}

.container{
  position:relative;
  z-index:2;
  margin-top:25vh;
}

h1{
  color:#c2185b;
  font-size:34px;
}

p{
  font-size:20px;
  color:#444;
  line-height:1.8;
}

button{
  font-size:20px;
  padding:10px 25px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  margin:10px;
}

#yes{
  background:#c2185b;
  color:white;
}

#no{
  background:#999;
  color:white;
  position:absolute;
}

#message{
  display:none;
}

/* قلوب */
.heart{
  position:fixed;
  color:#ff4d6d;
  font-size:20px;
  animation: float 6s linear infinite;
}

@keyframes float{
  0%{
    transform:translateY(100vh) scale(1);
    opacity:1;
  }
  100%{
    transform:translateY(-10vh) scale(1.5);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="container" id="question">
  <h1>تحبين بابا؟ 😘</h1>
  <button id="yes" onclick="showLove()">إيوا 😍</button>
  <button id="no">لا🙊🙊</button>
</div>

<div class="container" id="message">
  <h1>✨ معايدتي لزوجتي الغالية ✨</h1>
  <p>
    من قلبي أقولها…  
    وجودك بحياتي هو العيد 🤍  
    وكل سنة وأنا أحبك أكثر  
     وكل يوم أحمد الله عليك احبك للابد 🤎🤎 🌹
  </p>
  <p>كل عام وإنتِ حبيبتي 🤍</p>
</div>

<script>
// زر لا يهرب 😈
const noBtn = document.getElementById("no");
noBtn.addEventListener("mouseover",()=>{
  const x = Math.random()* (window.innerWidth-100);
  const y = Math.random()* (window.innerHeight-50);
  noBtn.style.left = x+"px";
  noBtn.style.top  = y+"px";
});

// عرض المعايدة
function showLove(){
  document.getElementById("question").style.display="none";
  document.getElementById("message").style.display="block";
}

// قلوب بكل الشاشة 💖
function createHeart(){
  const heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="💖";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(15+Math.random()*30)+"px";
  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),6000);
}
setInterval(createHeart,300);
</script>

</body>
</html>
